title: "[Question] "
body:
  - type: markdown
    attributes:
      value: |
        Ask anything about andrdscren or using a screen reader on Android.
        There are no wrong questions. You do not need technical knowledge to ask.
        If you found a bug (something that is broken, not just unclear), open a Bug report issue instead.

  - type: textarea
    id: question
    attributes:
      label: What is your question
      description: Describe what you are trying to do and where you are stuck.
      placeholder: "Example: I enabled andrdscren in Accessibility settings but it only reads some apps and goes silent in others. Is there a setting I am missing?"
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you already tried
      description: This helps avoid repeating suggestions you have already tested.
      placeholder: "Example: I tried toggling the service off and on again and restarting the phone. The problem still happens in the same apps."
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Android version and device
      placeholder: "Example: Android 11, Samsung Galaxy A21s"
    validations:
      required: false
