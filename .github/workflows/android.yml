name: Android CI — andrdscren

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build andrdscren APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Print commit being built
        run: git log -1 --format="%H  %s  (%ci)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      # Use ./gradlew (the repo's own wrapper), NOT the system gradle command.
      # The system gradle version is almost never compatible with the project.
      - name: Build debug APK
        run: ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon --stacktrace || echo "Release build skipped (needs signing config)"

      - name: Locate APKs
        run: find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: andrdscren-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload release APK (if built)
        uses: actions/upload-artifact@v4
        with:
          name: andrdscren-release
          path: app/build/outputs/apk/release/
          retention-days: 30
          if-no-files-found: ignore
